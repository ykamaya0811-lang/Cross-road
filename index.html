<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ROAD DASH</title>
<style>
  :root{
    --sky-top:#8ecbe8;
    --sky-bot:#c9e8f5;
    --grass:#7bc96f;
    --grass-dark:#69b85d;
    --road:#4a4e58;
    --road-dark:#3c3f47;
    --line:#f2e9d8;
    --rail:#8a8f9a;
    --rail-dark:#6f7480;
    --accent:#ff6b4a;
    --accent2:#ffc23c;
    --ink:#1f2430;
    --card:#fffaf0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;overflow:hidden;
    font-family:'Segoe UI', 'Hiragino Sans', system-ui, sans-serif;
    background:linear-gradient(var(--sky-top),var(--sky-bot));
    touch-action:none;
    user-select:none;
  }
  #wrap{
    position:relative;
    width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
  }
  canvas{
    display:block;
    max-width:100vw;max-height:100vh;
    background:linear-gradient(var(--sky-top),var(--sky-bot));
  }
  #hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:16px 18px; pointer-events:none;
  }
  .pill{
    background:rgba(31,36,48,0.55);
    color:#fff;
    padding:8px 16px;
    border-radius:999px;
    font-weight:800;
    font-size:22px;
    letter-spacing:0.5px;
    display:flex; align-items:center; gap:6px;
    box-shadow:0 3px 0 rgba(0,0,0,0.15);
  }
  .pill .icon{font-size:18px;}
  #titleScreen, #gameOverScreen{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(20,24,32,0.55);
    backdrop-filter: blur(2px);
    text-align:center;
    padding:20px;
    z-index:10;
  }
  .card{
    background:var(--card);
    border-radius:24px;
    padding:32px 28px;
    box-shadow:0 10px 0 rgba(0,0,0,0.2);
    max-width:340px;
    width:100%;
  }
  .logo{
    font-size:42px;
    font-weight:900;
    color:var(--ink);
    letter-spacing:1px;
    margin:0 0 4px 0;
    line-height:1.05;
  }
  .logo span{color:var(--accent);}
  .tagline{
    font-size:13px;
    color:#8a8f9a;
    font-weight:700;
    margin-bottom:22px;
    letter-spacing:2px;
    text-transform:uppercase;
  }
  .bigbtn{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-weight:800;
    font-size:20px;
    padding:16px 40px;
    border-radius:16px;
    border:none;
    box-shadow:0 6px 0 #c94b2f;
    cursor:pointer;
    margin-top:6px;
    transition:transform .08s;
  }
  .bigbtn:active{ transform:translateY(4px); box-shadow:0 2px 0 #c94b2f; }
  .howto{
    margin-top:18px;
    font-size:13px;
    color:#666;
    line-height:1.6;
  }
  .scoreRow{
    display:flex; justify-content:center; gap:24px;
    margin:14px 0 6px 0;
  }
  .scoreBox{
    text-align:center;
  }
  .scoreBox .num{
    font-size:34px; font-weight:900; color:var(--ink);
  }
  .scoreBox .lbl{
    font-size:11px; color:#999; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  }
  .hidden{display:none !important;}
  #tapHint{
    position:absolute;
    bottom:22px; left:0; right:0;
    text-align:center;
    color:rgba(31,36,48,0.55);
    font-weight:800;
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    pointer-events:none;
    z-index:5;
  }
  #warnFlash{
    position:absolute; inset:0;
    background:rgba(255,60,40,0.0);
    pointer-events:none;
    transition:background .12s;
    z-index:4;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="warnFlash"></div>

  <div id="hud">
    <div class="pill" id="scorePill"><span class="icon">🏁</span><span id="scoreVal">0</span></div>
  </div>

  <div id="tapHint" class="hidden">タップで前進</div>

  <div id="titleScreen">
    <div class="card">
      <div class="logo">ROAD<br><span>DASH</span></div>
      <div class="tagline">Probably fun.</div>
      <button class="bigbtn" id="startBtn">START</button>
      <div class="howto">
        タップ（またはスペースキー）で1歩前進<br>
        車と電車を避けて、できるだけ先へ進もう！
      </div>
    </div>
  </div>

  <div id="gameOverScreen" class="hidden">
    <div class="card">
      <div class="logo" style="font-size:30px;">GAME<br><span>OVER</span></div>
      <div class="scoreRow">
        <div class="scoreBox"><div class="num" id="finalScore">0</div><div class="lbl">Score</div></div>
        <div class="scoreBox"><div class="num" id="bestScore">0</div><div class="lbl">Best</div></div>
      </div>
      <button class="bigbtn" id="retryBtn">RETRY</button>
    </div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const COLS = 9;
  let cell = 44;
  let VROWS = 15;

  const titleScreen = document.getElementById('titleScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');
  const scoreVal = document.getElementById('scoreVal');
  const finalScoreEl = document.getElementById('finalScore');
  const bestScoreEl = document.getElementById('bestScore');
  const tapHint = document.getElementById('tapHint');
  const warnFlash = document.getElementById('warnFlash');

  let best = 0;
  try{ best = parseInt(localStorage.getItem('roaddash_best')||'0',10); }catch(e){ best = 0; }

  function resize(){
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    const maxW = Math.min(window.innerWidth, 480);
    const maxH = window.innerHeight;
    cell = Math.floor(maxW / COLS);
    VROWS = Math.ceil(maxH / cell) + 1;
    const wCss = cell*COLS;
    const hCss = cell*VROWS;
    canvas.style.width = wCss+'px';
    canvas.style.height = hCss+'px';
    canvas.width = Math.floor(wCss*dpr);
    canvas.height = Math.floor(hCss*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);

  // ---------- world state ----------
  let rows = new Map(); // rowIndex -> row data
  let player, cameraRow, running, score, elapsed;
  const carColors = ['#ff6b4a','#ffc23c','#4ac9ff','#8bd45e','#c98bff','#ff8bc9'];

  function rand(a,b){ return a + Math.random()*(b-a); }
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function makeRow(idx){
    if(idx <= 1){
      return {type:'grass', trees:[]};
    }
    const depth = Math.max(0, idx-1);
    const r = Math.random();
    let type;
    if(r < 0.12 && idx > 6) type = 'rail';
    else if(r < 0.60) type = 'road';
    else type = 'grass';

    if(type==='grass'){
      const trees = [];
      const treeCount = Math.floor(rand(0,3));
      const used = new Set();
      for(let i=0;i<treeCount;i++){
        let c = Math.floor(rand(0,COLS));
        if(!used.has(c)){ used.add(c); trees.push(c); }
      }
      return {type:'grass', trees};
    }

    if(type==='road'){
      const dir = Math.random()<0.5 ? 1 : -1;
      const speed = rand(1.4, 2.6) + Math.min(depth*0.045, 2.2);
      const gap = rand(2.6, 4.2);
      const carW = 1.5 + Math.random()*0.6;
      const color = pick(carColors);
      const startOffset = rand(0, gap);
      return {type:'road', dir, speed, gap, carW, color, offset:startOffset, cars:[]};
    }

    // rail
    const dir = Math.random()<0.5 ? 1 : -1;
    const trainStyles = [
      {body:'#d6484a', dark:'#a4373a', trim:'#2a2320', window:'#ffe98a'},
      {body:'#2f6fb0', dark:'#234f80', trim:'#1c2f3f', window:'#bfe8ff'},
      {body:'#3f8f5f', dark:'#2c6b46', trim:'#20301f', window:'#ffe98a'},
      {body:'#c98b3d', dark:'#96652b', trim:'#2a2018', window:'#fff3c9'}
    ];
    const trainStyle = pick(trainStyles);
    return {type:'rail', dir, phase: rand(0,1), cycle: rand(4.5,6.5), warnDur:1.5, passDur:0.7, state:'idle', timer: rand(1.5,4), trainStyle};
  }

  function getRow(idx){
    if(!rows.has(idx)) rows.set(idx, makeRow(idx));
    return rows.get(idx);
  }

  function resetGame(){
    rows = new Map();
    player = {col: Math.floor(COLS/2), row:0, dispCol:Math.floor(COLS/2), dispRow:0, dir:'up', squish:0, dead:false};
    cameraRow = 0;
    running = true;
    score = 0;
    elapsed = 0;
    for(let i=0;i<3;i++) getRow(i);
    scoreVal.textContent = '0';
    warnFlash.style.background = 'rgba(255,60,40,0.0)';
  }

  // ---------- input: tap / space only, always moves forward one row ----------
  function queueHop(){
    if(!running) return;
    moveQueued = true;
  }
  let moveQueued = false;
  window.addEventListener('keydown', (e)=>{
    if(['ArrowUp','w','W',' ','Spacebar'].includes(e.key)) { e.preventDefault(); queueHop(); }
  });
  canvas.addEventListener('touchstart', (e)=>{ queueHop(); }, {passive:true});
  canvas.addEventListener('mousedown', (e)=>{ queueHop(); });

  function tryMove(){
    if(player.moving) return;
    const nc = player.col;
    const nr = player.row + 1;
    const targetRow = getRow(nr);
    player.row = nr;
    player.dir = 'up';
    player.moving = true;
    player.moveT = 0;
    player.fromCol = player.dispCol;
    player.fromRow = player.dispRow;
    if(nr > score){ score = nr; scoreVal.textContent = String(score); }
    for(let i=nr+1; i<=nr+6; i++) getRow(i);
  }

  function cameraRowTarget(){
    return Math.max(0, player.row - Math.floor(VROWS*0.42));
  }

  // ---------- update ----------
  let lastT = null;
  function update(dt){
    elapsed += dt;
    if(moveQueued){ tryMove(); moveQueued = false; }

    if(player.moving){
      player.moveT += dt/0.13;
      if(player.moveT>=1){
        player.moveT=1; player.moving=false;
      }
      const t = 1-Math.pow(1-player.moveT,2);
      player.dispCol = player.fromCol + (player.col-player.fromCol)*t;
      player.dispRow = player.fromRow + (player.row-player.fromRow)*t;
    }

    const camTarget = cameraRowTarget();
    cameraRow += (camTarget - cameraRow) * Math.min(1, dt*6);

    // update rows: cars & rails
    const startRow = Math.floor(cameraRow)-1;
    const endRow = startRow + VROWS + 2;
    for(let r=startRow; r<=endRow; r++){
      const row = getRow(r);
      if(row.type==='road'){
        row.offset += row.speed*row.dir*dt;
        // spawn logic: maintain cars list positions in "column units" continuously, wrap
        // Represent cars as repeating pattern with spacing = gap+carW, phase = offset
        row.cars = [];
        const spacing = row.gap + row.carW;
        const n = Math.ceil(COLS/spacing)+2;
        for(let i=-1;i<n;i++){
          let pos = (i*spacing + row.offset) ;
          pos = ((pos % (spacing*n)) + spacing*n) % (spacing*n) - spacing;
          row.cars.push(pos);
        }
      } else if(row.type==='rail'){
        row.timer -= dt;
        if(row.state==='idle' && row.timer<=0){
          row.state='warn'; row.timer=row.warnDur;
        } else if(row.state==='warn' && row.timer<=0){
          row.state='pass'; row.timer=row.passDur;
        } else if(row.state==='pass' && row.timer<=0){
          row.state='idle'; row.timer=rand(3.5,6);
        }
      }
    }

    // collision check — only when fully landed (not mid-hop), so visuals always match
    if(!player.dead && !player.moving){
      const pr = getRow(player.row);
      if(pr.type==='road'){
        const PLAYER_HALF = 0.15; // matches player sprite width in column units
        const playerCenter = player.col + 0.5; // matches visual render center
        for(const cpos of pr.cars){
          const carCenter = cpos + pr.carW/2;
          if(Math.abs(carCenter - playerCenter) < (pr.carW/2 + PLAYER_HALF)){
            killPlayer();
            break;
          }
        }
      } else if(pr.type==='rail' && pr.state==='pass'){
        killPlayer();
      }
    }

    // flash for approaching rail warn on visible rows
    let warning = 0;
    for(let r=startRow; r<=endRow; r++){
      const row = getRow(r);
      if(row.type==='rail' && row.state==='warn'){
        warning = Math.max(warning, 1 - row.timer/row.warnDur);
      }
    }
    warnFlash.style.background = warning>0 ? `rgba(255,60,40,${0.18*warning})` : 'rgba(255,60,40,0)';
  }

  function killPlayer(){
    if(player.dead) return;
    player.dead = true;
    running = false;
    setTimeout(()=>{ showGameOver(); }, 400);
  }

  // ---------- draw ----------
  function worldToScreenRow(r){
    return VROWS - 1 - (r - cameraRow);
  }

  function drawRow(r){
    const row = getRow(r);
    const sy = worldToScreenRow(r) * cell;
    if(sy < -cell || sy > canvas.clientHeight+cell) return;

    if(row.type==='grass'){
      ctx.fillStyle = (r%2===0)? '#7bc96f':'#74c368';
      ctx.fillRect(0, sy, COLS*cell, cell);
      for(const tc of row.trees){
        drawTree(tc*cell+cell/2, sy+cell/2);
      }
    } else if(row.type==='road'){
      ctx.fillStyle = (Math.floor(r/1)%2===0)? '#4a4e58':'#474b55';
      ctx.fillRect(0, sy, COLS*cell, cell);
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      const dashW = cell*0.32, dashH = 4;
      for(let x=0;x<COLS*cell;x+=cell*0.6){
        ctx.fillRect(x, sy+cell/2-dashH/2, dashW, dashH);
      }
      for(const cpos of row.cars){
        drawCar(cpos*cell, sy, row.carW*cell, cell, row.color, row.dir);
      }
    } else if(row.type==='rail'){
      ctx.fillStyle = '#8a8f9a';
      ctx.fillRect(0, sy, COLS*cell, cell);
      ctx.fillStyle = '#6f7480';
      for(let x=2;x<COLS*cell;x+=14){
        ctx.fillRect(x, sy+4, 6, cell-8);
      }
      ctx.fillStyle = '#3c3f47';
      ctx.fillRect(0, sy+cell*0.28, COLS*cell, 4);
      ctx.fillRect(0, sy+cell*0.68, COLS*cell, 4);

      if(row.state==='warn'){
        const p = 1 - row.timer/row.warnDur; // 0 -> just started warning, 1 -> train about to arrive

        // red/white hazard bar across the whole row, fades in as danger increases
        ctx.save();
        ctx.globalAlpha = 0.2 + p*0.6;
        const stripeH = cell*0.86;
        const stripeY = sy + (cell-stripeH)/2;
        ctx.fillStyle = '#ff3c28';
        ctx.fillRect(0, stripeY, COLS*cell, stripeH);
        ctx.fillStyle = '#fff6ec';
        const sw = cell*0.32;
        ctx.save();
        ctx.beginPath(); ctx.rect(0, stripeY, COLS*cell, stripeH); ctx.clip();
        for(let x=-sw*2; x<COLS*cell+sw; x+=sw*2){
          ctx.beginPath();
          ctx.moveTo(x, stripeY+stripeH);
          ctx.lineTo(x+sw*0.7, stripeY);
          ctx.lineTo(x+sw*1.3, stripeY);
          ctx.lineTo(x+sw*0.6, stripeY+stripeH);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
        ctx.restore();

        // alternating blinking red lights, speeding up as train approaches
        const blinkSpeed = 5 + p*9;
        const blinkOn = Math.floor(elapsed*blinkSpeed)%2===0;
        drawRailLight(cell*0.5, sy+cell*0.5, blinkOn);
        drawRailLight(COLS*cell-cell*0.5, sy+cell*0.5, !blinkOn);
      } else if(row.state==='pass'){
        drawTrain(sy, row.dir, row.trainStyle);
        const blinkOn = Math.floor(elapsed*10)%2===0;
        drawRailLight(cell*0.5, sy+cell*0.5, blinkOn);
        drawRailLight(COLS*cell-cell*0.5, sy+cell*0.5, blinkOn);
      }
    }
  }

  function drawTrain(sy, dir, style){
    const W = COLS*cell;
    const bodyTop = sy + cell*0.10;
    const bodyH = cell*0.80;
    const segW = cell*2.15;
    const gap = Math.max(3, cell*0.06);

    // motion streaks trailing behind (opposite of travel direction)
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#ffffff';
    for(let i=0;i<5;i++){
      const t = (elapsed*3 + i*0.37) % 1;
      const lx = dir>0 ? (1-t)*W*0.4 : W - (1-t)*W*0.4;
      ctx.fillRect(lx, sy+cell*0.2 + (i%3)*cell*0.22, cell*0.5*(1-t), 2.5);
    }
    ctx.restore();

    // segmented cars
    let x = 0;
    let first = true;
    while(x < W){
      const w = Math.min(segW, W-x);
      // coupler shadow
      ctx.fillStyle = style.dark;
      roundRect(x, bodyTop, w, bodyH, 8);
      ctx.fill();
      // body face inset
      ctx.fillStyle = style.body;
      roundRect(x+2, bodyTop+2, w-4, bodyH-4, 7);
      ctx.fill();
      // racing stripe
      ctx.fillStyle = style.dark;
      ctx.fillRect(x+2, bodyTop+bodyH*0.66, w-4, bodyH*0.10);
      // windows
      ctx.fillStyle = style.trim;
      roundRect(x+w*0.08, bodyTop+bodyH*0.16, w*0.84, bodyH*0.36, 4);
      ctx.fill();
      const winCount = Math.max(2, Math.round(w/(cell*0.55)));
      const winW = (w*0.84 - (winCount-1)*4) / winCount;
      for(let i=0;i<winCount;i++){
        const wx = x+w*0.08 + i*(winW+4);
        ctx.fillStyle = style.window;
        roundRect(wx+2, bodyTop+bodyH*0.19, winW-4, bodyH*0.30, 3);
        ctx.fill();
      }
      // wheels
      ctx.fillStyle = '#20222a';
      const wheelY = bodyTop+bodyH-2;
      const wheelCount = Math.max(2, Math.round(w/(cell*0.9)));
      for(let i=0;i<wheelCount;i++){
        const wx = x + w*(i+0.5)/wheelCount;
        ctx.beginPath(); ctx.arc(wx, wheelY, cell*0.08, 0, Math.PI*2); ctx.fill();
      }
      // coupler gap line
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(x+w-gap, bodyTop+bodyH*0.3, gap, bodyH*0.4);
      first = false;
      x += w;
    }

    // nose / cab at the leading end, in direction of travel
    const noseW = cell*0.5;
    ctx.fillStyle = style.dark;
    if(dir>0){
      roundRect(W-noseW*0.6, bodyTop, noseW, bodyH, 14);
      ctx.fill();
      ctx.fillStyle = '#fff6d8';
      ctx.beginPath(); ctx.arc(W-cell*0.08, sy+cell*0.5, cell*0.07, 0, Math.PI*2); ctx.fill();
    } else {
      roundRect(-noseW*0.4, bodyTop, noseW, bodyH, 14);
      ctx.fill();
      ctx.fillStyle = '#fff6d8';
      ctx.beginPath(); ctx.arc(cell*0.08, sy+cell*0.5, cell*0.07, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawRailLight(cx, cy, on){
    ctx.save();
    if(on){
      ctx.shadowColor = '#ff3c28';
      ctx.shadowBlur = cell*0.35;
    }
    ctx.fillStyle = '#241a1a';
    ctx.beginPath(); ctx.arc(cx, cy, cell*0.19, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = on? '#ff3c28' : '#5a1a12';
    ctx.beginPath(); ctx.arc(cx, cy, cell*0.14, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawTree(cx,cy){
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath(); ctx.ellipse(cx, cy+cell*0.28, cell*0.26, cell*0.09, 0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6b4a2f';
    ctx.fillRect(cx-cell*0.05, cy, cell*0.1, cell*0.22);
    ctx.fillStyle = '#4f9e46';
    ctx.beginPath(); ctx.arc(cx, cy-cell*0.08, cell*0.26, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#5cb352';
    ctx.beginPath(); ctx.arc(cx-cell*0.08, cy-cell*0.16, cell*0.18, 0, Math.PI*2); ctx.fill();
  }

  function drawCar(x, sy, w, h, color, dir){
    if(x+w < 0 || x > COLS*cell) return;
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.ellipse(x+w/2, sy+h*0.82, w*0.42, h*0.14, 0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = color;
    roundRect(x+w*0.04, sy+h*0.22, w*0.92, h*0.5, 6);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    if(dir>0){
      roundRect(x+w*0.55, sy+h*0.28, w*0.32, h*0.38, 4); ctx.fill();
    } else {
      roundRect(x+w*0.13, sy+h*0.28, w*0.32, h*0.38, 4); ctx.fill();
    }
    ctx.fillStyle = '#2a2d33';
    const wr = h*0.13;
    ctx.beginPath(); ctx.arc(x+w*0.22, sy+h*0.72, wr, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w*0.78, sy+h*0.72, wr, 0, Math.PI*2); ctx.fill();
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawPlayer(){
    const sx = player.dispCol*cell + cell/2;
    const sy = worldToScreenRow(player.dispRow)*cell + cell/2;
    const bob = player.moving ? -Math.abs(Math.sin(player.moveT*Math.PI))*6 : 0;
    ctx.save();
    ctx.translate(sx, sy+bob);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(0, cell*0.32-bob*0, cell*0.2, cell*0.08,0,0,Math.PI*2); ctx.fill();

    let rot = 0;
    if(player.dir==='left') rot=-Math.PI/2;
    else if(player.dir==='right') rot=Math.PI/2;
    else if(player.dir==='down') rot=Math.PI;
    ctx.rotate(rot);

    if(player.dead){
      ctx.rotate(Math.PI/2);
    }

    ctx.fillStyle = '#ffb347';
    roundRect(-cell*0.16, -cell*0.02, cell*0.32, cell*0.26, 6); ctx.fill();
    ctx.fillStyle = '#3a3f4a';
    roundRect(-cell*0.15, -cell*0.24, cell*0.3, cell*0.24, 8); ctx.fill();
    ctx.fillStyle = '#ffd9a8';
    ctx.beginPath(); ctx.arc(0,-cell*0.14, cell*0.11, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e2483c';
    roundRect(-cell*0.14, -cell*0.30, cell*0.28, cell*0.09, 4); ctx.fill();
    ctx.restore();
  }

  function drawBackground(){
    ctx.clearRect(0,0,canvas.clientWidth, canvas.clientHeight);
  }

  function frame(t){
    if(lastT===null) lastT=t;
    const dt = Math.min(0.05,(t-lastT)/1000);
    lastT = t;

    if(running) update(dt);

    drawBackground();
    const startRow = Math.floor(cameraRow)-1;
    const endRow = startRow + VROWS + 2;
    for(let r=startRow; r<=endRow; r++) drawRow(r);
    drawPlayer();

    requestAnimationFrame(frame);
  }

  function showGameOver(){
    if(score>best){
      best = score;
      try{ localStorage.setItem('roaddash_best', String(best)); }catch(e){}
    }
    finalScoreEl.textContent = String(score);
    bestScoreEl.textContent = String(best);
    gameOverScreen.classList.remove('hidden');
  }

  function startGame(){
    titleScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    tapHint.classList.remove('hidden');
    resize();
    resetGame();
  }

  startBtn.addEventListener('click', startGame);
  retryBtn.addEventListener('click', startGame);

  resize();
  resetGame();
  running = false;
  requestAnimationFrame(frame);
})();
</script>
</body>
